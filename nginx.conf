server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/manifest+json;

    # Avoid trailing-slash 301s — Workbox precache rejects redirects and SW becomes redundant.
    absolute_redirect off;
    port_in_redirect off;

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        # Serve /page via /page/index.html without redirecting to /page/
        try_files $uri $uri/index.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
